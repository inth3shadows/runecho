name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths: [".goreleaser.yaml", ".github/workflows/release.yml"]

permissions:
  contents: read

jobs:
  # PR-time: prove the config and build all tags/platforms without publishing,
  # so a broken .goreleaser.yaml fails CI here rather than during a real release.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v6
        with: { go-version-file: go.mod }
      - uses: goreleaser/goreleaser-action@v6
        with: { version: "~> v2", args: "check" }
      - uses: goreleaser/goreleaser-action@v6
        with: { version: "~> v2", args: "build --snapshot --clean" }

  # Tag push: cut the real release with downloadable binaries + checksums.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v6
        with: { go-version-file: go.mod }
      - uses: goreleaser/goreleaser-action@v6
        with: { version: "~> v2", args: "release --clean" }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
