name: Release

on:
  push:
    tags: ["v*"]
    branches: [master]
  pull_request:
    paths:
      - ".goreleaser.yaml"
      - ".github/workflows/release.yml"
      - "scripts/next-release.py"
      - "scripts/next-release-test.py"

permissions:
  contents: read

jobs:
  # PR-time: prove the config and build all tags/platforms without publishing,
  # so a broken .goreleaser.yaml fails CI here rather than during a real release.
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with: { go-version-file: go.mod }
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with: { version: "~> v2", args: "check" }
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with: { version: "~> v2", args: "build --snapshot --clean" }
      # The release decision logic is a script precisely so it can be exercised
      # without pushing a tag. A change to it must fail here, not in production.
      - name: Self-test the release decision logic
        run: python3 scripts/next-release-test.py

  # Push to master: decide whether this merge is a release, and if so tag and
  # publish it. This is what removes "cut a tag" as a thing anyone has to
  # remember — see scripts/next-release.py for the bump rules.
  #
  # WHY THIS JOB PUBLISHES INSTEAD OF LETTING THE `release` JOB BELOW DO IT:
  # a tag pushed using GITHUB_TOKEN does NOT trigger another workflow run.
  # GitHub suppresses that to prevent recursion. So `on: push: tags` will not
  # fire for a tag this job creates, and the release has to happen right here or
  # not at all. That same suppression is what keeps the CHANGELOG commit below
  # from re-triggering this job; the skip-ci marker is belt-and-braces.
  #
  # HAZARD, learned the hard way on this file's own first push: GitHub honours
  # that skip marker ANYWHERE in a commit message, body included. This repo
  # squash-merges with squash_merge_commit_message=PR_BODY, so a PR whose body
  # merely DESCRIBES the marker becomes a master commit message containing it —
  # and silently suppresses this job. If a release you expected did not happen,
  # check the merge commit message for the token before suspecting anything here.
  autorelease:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'inth3shadows/runecho'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Both required by attest-build-provenance: id-token to mint the OIDC
      # token Sigstore signs against, attestations to store the result.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        # Full history AND tags: the version is computed from the highest
        # existing semver tag, which a shallow clone would not have.
        with: { fetch-depth: 0 }

      - name: Decide the release
        id: decide
        run: |
          subject="$(git log -1 --format=%s)"
          echo "subject: $subject"
          python3 scripts/next-release.py --subject "$subject" --apply >> "$GITHUB_OUTPUT"

      - name: Report a skip
        if: steps.decide.outputs.version == ''
        run: echo "No release for this merge (${{ steps.decide.outputs.skip }})."

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        if: steps.decide.outputs.version != ''
        with: { go-version-file: go.mod }

      - name: Commit the changelog and tag
        if: steps.decide.outputs.version != ''
        env:
          VERSION: ${{ steps.decide.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          # Push the commit and the tag as one atomic update: a tag without its
          # changelog commit, or the reverse, is a state nothing else recovers from.
          git push --atomic origin HEAD:master "refs/tags/v${VERSION}"

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        if: steps.decide.outputs.version != ''
        with: { version: "~> v2", args: "release --clean" }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # checksums.txt proves the archives weren't corrupted in transit; it does
      # NOT prove who built them, because anyone who can replace an archive can
      # replace the checksum file sitting next to it. Provenance closes that:
      # a signed, Sigstore-backed statement of which workflow, at which commit,
      # produced these exact bytes. Verify with:
      #   gh attestation verify runecho_<ver>_<os>_<arch>.tar.gz -R inth3shadows/runecho
      # Keyless (OIDC) — nothing to rotate, no secret to leak.
      - name: Attest build provenance
        if: steps.decide.outputs.version != ''
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*.tar.gz,dist/*.zip,dist/checksums.txt"

  # Tag push: cut the real release with downloadable binaries + checksums.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with: { go-version-file: go.mod }
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with: { version: "~> v2", args: "release --clean" }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Same provenance attestation as the autorelease job above — both paths
      # publish downloadable binaries, so both must be verifiable.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*.tar.gz,dist/*.zip,dist/checksums.txt"
